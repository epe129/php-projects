<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            color: #1f2937;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 28%),
                        radial-gradient(circle at top right, rgba(16, 185, 129, 0.12), transparent 24%);
            pointer-events: none;
            z-index: -1;
        }

        nav {
            background: #111827;
            padding: 12px 24px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        }

        nav ul {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav li {
            margin: 0;
        }

        nav li a {
            display: inline-flex;
            align-items: center;
            color: #f9fafb;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        nav li a:hover,
        nav li a:focus {
            background-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .hero {
            display: grid;
            gap: 20px;
            margin-top: 28px;
            padding: 28px 32px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.08);
        }

        .hero-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .hero-title {
            margin: 0;
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.05;
            color: #111827;
        }

        .hero-copy {
            margin: 0;
            max-width: 680px;
            color: #4b5563;
            font-size: 1rem;
            line-height: 1.8;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border: none;
            border-radius: 999px;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .button.secondary {
            background: #e5e7eb;
            color: #1f2937;
        }

        .button:hover,
        .button:focus {
            transform: translateY(-1px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-top: 8px;
        }

        .stat-card {
            background: #f9fafb;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 22px;
            padding: 22px 24px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.05);
        }

        .stat-card h3 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            color: #6b7280;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .stat-card p {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            line-height: 1;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 22px;
            margin-top: 28px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 26px;
            padding: 26px;
            box-shadow: 0 22px 70px rgba(15, 23, 42, 0.06);
        }

        .panel h2 {
            margin: 0 0 18px;
            font-size: 1.25rem;
            color: #111827;
        }

        .panel p {
            margin: 0;
            color: #475569;
            line-height: 1.75;
        }

        .recent-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .recent-table th,
        .recent-table td {
            padding: 14px 16px;
            text-align: left;
        }

        .recent-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #6b7280;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .recent-table tbody tr {
            background: #ffffff;
            transition: background-color 0.15s ease;
        }

        .recent-table tbody tr:hover {
            background: #f8fafc;
        }

        .recent-table td {
            color: #334155;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .panel.small-cards {
            display: grid;
            gap: 16px;
        }

        .metric-card {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding: 18px 22px;
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: #ffffff;
        }

        .metric-card p {
            margin: 0;
            color: #475569;
            font-size: 0.95rem;
        }

        .metric-card strong {
            display: block;
            margin-top: 6px;
            font-size: 1.5rem;
            color: #111827;
        }

        @media (max-width: 960px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            nav ul {
                flex-direction: column;
                align-items: stretch;
            }

            .hero,
            .panel {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .hero-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/dashboard">Home</a></li>
            <li><a href="/delete-posts">Delete Posts</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero">
            <div class="hero-header">
                <div>
                    <h1 class="hero-title">Admin Dashboard</h1>
                    <p class="hero-copy">Monitor blog activity, manage posts, and review key metrics from one polished dashboard interface.</p>
                </div>
                <div class="hero-actions">
                    <a class="button" href="/dashboard">View Posts</a>
                    <a class="button secondary" href="/delete-posts">Manage Posts</a>
                </div>
            </div>

            <div class="stats-grid">
                <article class="stat-card">
                    <h3>Total Posts</h3>
                    <p></p>
                </article>
                <article class="stat-card">
                    <h3>Live Comments</h3>
                    <p></p>
                </article>
                <article class="stat-card">
                    <h3>Users</h3>
                    <p>{{ users[0][0] }}</p>
                </article>
            </div>
        </section>

        <div class="dashboard-grid">
            <section class="panel">
                <h2>Recent posts</h2>
                <table class="recent-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Author</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td><span class="tag"></span></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>
</body>
</html>
