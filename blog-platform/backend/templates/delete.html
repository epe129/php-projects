<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete</title>
    <style>
        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .hero {
            display: grid;
            gap: 20px;
            margin-top: 28px;
            padding: 28px 32px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.08);
        }

        .hero-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .hero-title {
            margin: 0;
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.05;
            color: #111827;
        }

        .hero-copy {
            margin: 0;
            max-width: 680px;
            color: #4b5563;
            font-size: 1rem;
            line-height: 1.8;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border: none;
            border-radius: 999px;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .button.secondary {
            background: #e5e7eb;
            color: #1f2937;
        }

        .button:hover,
        .button:focus {
            transform: translateY(-1px);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 22px;
            margin-top: 28px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 26px;
            padding: 26px;
            box-shadow: 0 22px 70px rgba(15, 23, 42, 0.06);
        }

        .panel h2 {
            margin: 0 0 18px;
            font-size: 1.25rem;
            color: #111827;
        }

        .panel p {
            margin: 0;
            color: #475569;
            line-height: 1.75;
        }

        .recent-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .recent-table th,
        .recent-table td {
            padding: 14px 16px;
            text-align: left;
        }

        .recent-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #6b7280;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .recent-table tbody tr {
            background: #ffffff;
            transition: background-color 0.15s ease;
        }

        .recent-table tbody tr:hover {
            background: #f8fafc;
        }

        .recent-table td {
            color: #334155;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .panel.small-cards {
            display: grid;
            gap: 16px;
        }

        .metric-card {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding: 18px 22px;
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: #ffffff;
        }

        .metric-card p {
            margin: 0;
            color: #475569;
            font-size: 0.95rem;
        }

        .metric-card strong {
            display: block;
            margin-top: 6px;
            font-size: 1.5rem;
            color: #111827;
        }

        @media (max-width: 960px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            nav ul {
                flex-direction: column;
                align-items: stretch;
            }

            .hero,
            .panel {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .hero-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    {% extends "navbar.html" %}
    {% block content %}
        <div class="container">
            <section class="hero">
                <div class="hero-header">
                    <div>
                        <h1 class="hero-title">Delete</h1>
                        <p>Delete different data from the system.</p>
                    </div>
                </div>  
            </section>
            <div class="dashboard-grid">
                <section class="panel">
                    <h2>Delete Post</h2>
                    {% for post in posts %}
                    <form method="POST" action="/delete">
                        <input type="hidden" name="post_id" value="{{ post[0] }}">
                        <p>Titled "{{ post[2] }}"?</p>
                        <p>Author ID: {{ post[1] }}</p>
                        <p>Content: {{ post[3] }}</p>
                        <p>Created at: {{ post[4] }}</p>
                        <p>Post ID: {{ post[0] }}</p>
                        <button type="submit" class="delete-button">Delete Post</button>
                    </form>
                    <br/>
                    <hr/>
                    <br/>
                    {% endfor %}
                </section>
            </div>
        </div>
    {% endblock %}
</body>
</html>
